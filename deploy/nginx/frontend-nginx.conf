# frontend-nginx.conf
# Configuration Nginx pour servir l'application React (SPA) de Kleia-up
# Ce fichier est copié dans le conteneur frontend

server {
    listen 3000;
    server_name localhost;

    # Répertoire racine des fichiers statiques
    root /usr/share/nginx/html;
    index index.html;

    # --- En-têtes de sécurité ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Cache agressif pour les assets statiques (JS, CSS, images) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Cache court pour les fichiers HTML et JSON ---
    location ~* \.(html|json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # --- Gestion du routage SPA (Single Page Application) ---
    # Toutes les requêtes qui ne correspondent pas à un fichier existant
    # sont redirigées vers index.html pour que React Router puisse les gérer
    location / {
        try_files $uri $uri/ /index.html;
    }
}