# deploy.yml
# Pipeline CI/CD pour la plateforme e-learning Kleia-up
# Déploiement automatique sur le VPS OVH (135.125.53.215)

name: Déploiement Kleia-up

on:
  push:
    branches:
      - main

env:
  DEPLOY_PATH: /opt/kleia-up
  VPS_HOST: 135.125.53.215
  VPS_USER: ubuntu

jobs:
  test:
    name: Tests et linting
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances backend
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Vérification du linting backend
        working-directory: ./backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Exécution des tests backend (placeholder)
        working-directory: ./backend
        run: pytest --verbose || echo "Aucun test trouvé pour le moment"

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances frontend
        working-directory: ./frontend
        run: npm ci

      - name: Vérification du linting frontend
        working-directory: ./frontend
        run: npx eslint src/ --ext .js,.jsx,.ts,.tsx || echo "ESLint non configuré"

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: Déploiement sur le VPS OVH
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Configuration de la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host ovh-vps
            HostName ${{ env.VPS_HOST }}
            User ${{ env.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Déploiement via Docker Compose
        run: |
          ssh ovh-vps << 'DEPLOY_EOF'
            set -e
            echo "→ Mise à jour du code source..."
            cd ${{ env.DEPLOY_PATH }}
            git pull origin main

            echo "→ Copie des fichiers de déploiement..."
            cp deploy/.env .env 2>/dev/null || echo "⚠ .env déjà présent"

            echo "→ Reconstruction et redémarrage des services..."
            docker-compose -f deploy/docker-compose.yml pull
            docker-compose -f deploy/docker-compose.yml up -d --build

            echo "→ Nettoyage des images obsolètes..."
            docker image prune -f

            echo "✅ Déploiement terminé avec succès"
          DEPLOY_EOF

      - name: Vérification de l'état des services
        run: |
          ssh ovh-vps "docker-compose -f ${{ env.DEPLOY_PATH }}/deploy/docker-compose.yml ps"